services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pathweave
      POSTGRES_USER: pathweave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathweave"]
      interval: 10s
      timeout: 5s
      retries: 5
  migrate:
    build: .
    environment:
      DATABASE_URL: postgres://pathweave:${POSTGRES_PASSWORD}@postgres:5432/pathweave
    depends_on:
      postgres: { condition: service_healthy }
    command: ["node", "apps/api/dist/migrate.js"]
  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://pathweave:${POSTGRES_PASSWORD}@postgres:5432/pathweave
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?set ALLOWED_ORIGIN}
      PORT: 3001
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    expose: ["3001"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api: { condition: service_healthy }
volumes:
  postgres_data:
  caddy_data:
  caddy_config:
